// ── Supabase ──────────────────────────────────────────────────
async function loadFromSB(){
  try{
    const{data,error}=await sb.from('budget_data').select('data').eq('id','shared').single();
    if(error)throw error;
    if(data&&data.data&&Object.keys(data.data).length>0){
      const d=data.data;
      if(!d.salary&&(d.totalSalary||d.celIncome||d.bryIncome)){d.salary=d.totalSalary||(d.celIncome||0)+(d.bryIncome||0);}
      delete d.totalSalary;delete d.celIncome;delete d.bryIncome;
      if(!d.grocery)d.grocery=[];
      Object.assign(S,d);
    }
    syncStatus='synced';
  }catch(e){console.error(e);syncStatus='error';}
}
async function saveSB(){
  try{setSS('syncing');const{error}=await sb.from('budget_data').upsert({id:'shared',data:S,updated_at:new Date().toISOString()});if(error)throw error;setSS('synced');}catch(e){console.error(e);setSS('error');}
}
function sched(){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(saveSB,800);}
function setSS(s){
  syncStatus=s;
  const bar=document.getElementById('sb'),dot=document.getElementById('sd'),txt=document.getElementById('st');
  if(!bar)return;
  const msgs={synced:'Synced — both phones up to date',syncing:'Syncing...',error:'Sync error — check connection'};
  bar.className='sync-bar '+s;dot.className='sync-dot '+s;txt.textContent=msgs[s]||'';
}
function subscribeRT(){
  sb.channel('budget_rt').on('postgres_changes',{event:'UPDATE',schema:'public',table:'budget_data',filter:'id=eq.shared'},p=>{
    if(p.new&&p.new.data){Object.assign(S,p.new.data);if(!S.grocery)S.grocery=[];syncAmort();render();setSS('synced');}
  }).subscribe();
}

// ── Finance ───────────────────────────────────────────────────
const fmt=n=>'₱'+Math.round(n).toLocaleString();
const pct=(a,b)=>b>0?Math.min(100,Math.round(a/b*100)):0;
const todayStr=()=>new Date().toISOString().slice(0,10);
const getAP=()=>S.periods.find(p=>p.id===S.activePeriod)||S.periods[0];

function calcInc(pid){
  const ap=pid?S.periods.find(p=>p.id===pid):null;
  const salary=(ap&&ap.salary)?ap.salary:(S.salary||0);
  const viosNet=S.rental-(S.viosAmort||0);
  return{pool:salary,salary,viosNet,eachRental:viosNet/2};
}
function calcShared(pid){
  const{pool}=calcInc(pid);
  const exps=S.expsShared[pid]||[];
  const planned=exps.filter(e=>e.type==='planned'||e.auto).reduce((a,e)=>a+e.amt,0);
  const actual=exps.filter(e=>e.type==='actual'&&!e.auto).reduce((a,e)=>a+e.amt,0);
  const leftover=pool-planned;
  return{pool,planned,actual,leftover,eachSplit:Math.max(0,leftover)/2};
}
function calcPersonalBudget(pid){
  const{eachRental}=calcInc(pid);
  const{eachSplit}=calcShared(pid);
  return eachSplit+eachRental;
}

// ── Sync Livina only to Shared pool ──────────────────────────
function syncAmort(){
  // clean up stale entries
  const livinaIds=new Set(S.livina.map(r=>r.id));
  S.periods.forEach(period=>{
    const exps=S.expsShared[period.id];
    if(!exps)return;
    for(let i=exps.length-1;i>=0;i--){
      if(!exps[i].auto)continue;
      const rowId=exps[i].id.replace('amort_','').split('_')[0];
      if(!livinaIds.has(rowId))exps.splice(i,1);
    }
  });

  S.periods.forEach(period=>{
    const{id:pid,start,end}=period;
    if(!S.expsShared[pid])S.expsShared[pid]=[];
    const exps=S.expsShared[pid];

    // ONLY sync Livina — Vios comes from rental income, not shared pool
    S.livina.filter(row=>row.dueDate&&row.dueDate.trim()!=='').forEach(row=>{
      [{payDate:row.payDate1,amt:row.pay1||0,slot:'a'},{payDate:row.payDate2,amt:row.pay2||0,slot:'b'}].forEach(({payDate,amt,slot})=>{
        if(!payDate)return;
        const eid='amort_'+row.id+'_'+slot+'_'+pid;
        const inPeriod=payDate>=start&&payDate<=end;
        const idx=exps.findIndex(e=>e.id===eid);
        // use actual payment if available, else planned split, else due split
        const syncAmt=amt>0?amt:(row.planned>0?row.planned/2:row.dueAmt/2);
        const desc='Livina amort '+(slot==='a'?'(pay 1)':'(pay 2)')+' '+payDate;
        if(inPeriod){
          if(idx===-1)exps.push({id:eid,desc,cat:'others',amt:syncAmt,date:payDate,auto:true,type:'planned'});
          else{exps[idx].amt=syncAmt;exps[idx].date=payDate;exps[idx].desc=desc;}
        } else {
          if(idx>-1)exps.splice(idx,1);
        }
      });
    });
  });
}

  return[...exps].reverse().map((e,ri)=>{
    const i=exps.length-1-ri;
    const cat=cats.find(c=>c.k===e.cat)||cats[cats.length-1];
    const ts=e.auto?'background:#F1EFE8;color:#444441':e.type==='planned'?'background:#EEEDFE;color:#3C3489':'background:#E1F5EE;color:#085041';
    const tl=e.auto?'auto':e.type==='planned'?'planned':'actual';
    const ac=e.type==='actual'&&!e.auto?'color:#1D9E75':'color:#534AB7';
    return`<div class="ei"><span class="ebadge" style="background:${cat.bl};color:${cat.bt}">${cat.l.split('/')[0].trim()}</span><span class="edesc">${e.desc}<span class="etag" style="${ts}">${tl}</span></span>${e.date?`<span class="edate">${e.date}</span>`:''}<span class="eamt" style="${ac}">${fmt(e.amt)}</span><button class="dbtn" onclick="delExp('${who}','${pid}',${i})">×</button></div>`;
  }).join('');
}

        <input type="date" value="${payDate1||''}" style="width:105px;font-size:11px;padding:3px 5px" onchange="updateAmort('${car}',${origIdx},'payDate1',this.value)">
        <input type="number" value="${pay1||''}" placeholder="0" style="width:80px;font-size:11px;padding:3px 5px;margin-top:3px" inputmode="numeric" onblur="updateAmort('${car}',${origIdx},'pay1',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
      </td>
      <td style="background:#E1F5EE11">
        <input type="date" value="${payDate2||''}" style="width:105px;font-size:11px;padding:3px 5px" onchange="updateAmort('${car}',${origIdx},'payDate2',this.value)">
        <input type="number" value="${pay2||''}" placeholder="0" style="width:80px;font-size:11px;padding:3px 5px;margin-top:3px" inputmode="numeric" onblur="updateAmort('${car}',${origIdx},'pay2',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
      </td>
      <td style="font-weight:600;color:${balColor};font-size:13px;white-space:nowrap">${fmt(balance)}</td>
      <td><button class="dbtn" onclick="delAmortRow('${car}',${origIdx})">×</button></td>
    </tr>`;
  }).join('');
  return`
    <div class="metrics">
      <div class="mc"><div class="mc-l">Total due</div><div class="mc-v" style="color:${accent}">${fmt(tDue)}</div></div>
      <div class="mc"><div class="mc-l">Total paid</div><div class="mc-v" style="color:#1D9E75">${fmt(tPaid)}</div></div>
      <div class="mc"><div class="mc-l">Outstanding</div><div class="mc-v" style="color:${tDue-tPaid>0?'#D85A30':'#1D9E75'}">${fmt(Math.max(0,tDue-tPaid))}</div></div>
    </div>
    ${isLivina?`<div class="tip" style="margin-bottom:1rem"><b>Note:</b> Livina payments auto-sync to Shared pool by pay date. Vios does not — it comes from rental income.</div>`:''}
    <div class="card" style="padding:.875rem">
      <div class="leg-row">
        <span class="leg"><span class="leg-dot" style="background:${accent}"></span>Due amount (editable)</span>
        <span class="leg"><span class="leg-dot" style="background:#534AB7"></span>Pay 1</span>
        <span class="leg"><span class="leg-dot" style="background:#1D9E75"></span>Pay 2</span>
        <span class="leg"><span class="leg-dot" style="background:#D85A30"></span>Rolling balance</span>
      </div>
      <div class="amort-wrap">
        <table class="at">
          <thead><tr><th>Status</th><th style="background:${acBg}">Due ₱</th><th>Due date</th><th style="background:#EEEDFE22">Pay date 1 / Amt</th><th style="background:#E1F5EE22">Pay date 2 / Amt</th><th>Balance →</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <button class="add-btn" style="color:${accent};margin-top:.875rem;display:inline-flex" onclick="addAmortRow('${car}')">+ add row</button>
    </div>
    <div class="tip"><b>Balance</b> = (carried + due) − pay 1 − pay 2, rolling forward. ${isLivina?'Payments sync to Shared pool automatically.':'Vios payments do not affect Shared pool.'}</div>`;
}

// ── View: Grocery ─────────────────────────────────────────────
function vGrocery(){
  const list=S.grocery||[];
  const done=list.filter(i=>i.checked).length;
  const tAll=list.reduce((a,i)=>a+(i.qty||0)*(i.price||0),0);
  const tBought=list.filter(i=>i.checked).reduce((a,i)=>a+(i.qty||0)*(i.price||0),0);
  const tLeft=list.filter(i=>!i.checked).reduce((a,i)=>a+(i.qty||0)*(i.price||0),0);
  const cards=list.map((item,i)=>{
    const total=Math.round((item.qty||0)*(item.price||0));
    const imgContent=item.photo?`<img src="${item.photo}" style="width:100%;height:100%;object-fit:cover">`:`<span class="gc-emoji" onclick="event.stopPropagation();openGrocModal(${i})" style="font-size:34px">${item.emoji||'🛒'}</span>`;
    return`<div class="gc${item.checked?' done':''}" onclick="toggleGroc(${i})">
      <div class="gc-check">${item.checked?'✓':''}</div>
      <button class="gc-del" onclick="event.stopPropagation();delGroc(${i})">×</button>
      <div class="gc-img">${imgContent}<button class="gc-photo" onclick="event.stopPropagation();openGrocModal(${i})">📷 edit</button></div>
      <div class="gc-body">
        <span class="gc-name">${item.name}</span>
        <div class="gc-row">
          <div><div class="gc-lbl">Qty</div><input class="gc-inp" type="number" value="${item.qty||''}" placeholder="1" onclick="event.stopPropagation()" onblur="updateGroc(${i},'qty',this.value)" onkeydown="if(event.key==='Enter')this.blur()"></div>
          <div><div class="gc-lbl">Price ₱</div><input class="gc-inp" type="number" value="${item.price||''}" placeholder="0" onclick="event.stopPropagation()" onblur="updateGroc(${i},'price',this.value)" onkeydown="if(event.key==='Enter')this.blur()"></div>
        </div>
        <div class="gc-total">${total>0?fmt(total)+'  total':'—'}</div>
      </div>
    </div>`;
  }).join('')||'<div class="empty" style="grid-column:1/-1">No items yet — add some above 🛒</div>';
  return`
    <div class="groc-search-row">
      <input type="text" id="groc-inp" placeholder="Type item name..." style="flex:1" onkeydown="if(event.key==='Enter'){openGrocModalNew()}">
      <button class="add-btn" onclick="openGrocModalNew()" style="white-space:nowrap">+ add</button>
    </div>
    <div class="sug-row">
      ${[['🥚','Eggs'],['🥛','Milk'],['🍗','Chicken'],['🍚','Rice'],['🍞','Bread'],['🥔','Chips']].map(([e,n])=>`<button class="sug" onclick="quickAddGroc('${n}','${e}')"><span style="font-size:13px">${e}</span>${n}</button>`).join('')}
    </div>
    <div class="groc-grid">${cards}</div>
    ${list.length?`<div class="groc-total-bar">
      <div class="split-row"><span>🛍 Bought (${done})</span><span style="font-weight:600;color:#1D9E75">${fmt(tBought)}</span></div>
      <div class="split-row"><span>🛒 Still needed (${list.length-done})</span><span style="font-weight:600;color:#D85A30">${fmt(tLeft)}</span></div>
      <div class="split-row" style="border:none;font-weight:700;font-size:14px;padding-top:6px"><span>Grand total</span><span style="color:var(--acc)">${fmt(tAll)}</span></div>
    </div>`:''}`;
}

// ── View: Settings ────────────────────────────────────────────
function vSettings(){
  const inc=calcInc();
  return`
    <div class="card">
      <div class="card-title" style="margin-bottom:.875rem">Vios rental</div>
      <div class="sg">
        <div class="sf"><label>Vios rental income</label><input type="number" value="${S.rental}" inputmode="numeric" onchange="S.rental=+this.value;sched();render()"></div>
        <div class="sf"><label>Vios amortization</label><input type="number" value="${S.viosAmort||0}" inputmode="numeric" onchange="S.viosAmort=+this.value;sched();render()"></div>
      </div>
      <div class="tip">Vios net = <b>${fmt(inc.viosNet)}</b> · Each person gets <b>${fmt(inc.eachRental)}</b> rental share</div>
    </div>
    <div class="card">
      <div class="card-title" style="margin-bottom:.5rem">Pay periods</div>
      <div style="display:grid;grid-template-columns:90px 1fr 80px 80px 80px 28px;gap:4px;padding:4px 0;font-size:10px;color:var(--txt2);font-weight:600;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--bd)">
        <span>Payday</span><span>Label</span><span>From</span><span>To</span><span>Salary ₱</span><span></span>
      </div>
      ${S.periods.map((p,i)=>`<div style="display:grid;grid-template-columns:90px 1fr 80px 80px 80px 28px;gap:4px;padding:5px 0;border-bottom:1px solid var(--bg2);align-items:center">
        <input type="date" value="${p.payday||''}" style="font-size:10px;padding:3px 5px" onchange="S.periods[${i}].payday=this.value;sched();render()">
        <input type="text" value="${p.label}" style="font-size:11px;min-width:0" onchange="S.periods[${i}].label=this.value;sched();render()">
        <input type="date" value="${p.start}" style="font-size:10px;padding:3px 5px" onchange="S.periods[${i}].start=this.value;sched();render()">
        <input type="date" value="${p.end}" style="font-size:10px;padding:3px 5px" onchange="S.periods[${i}].end=this.value;sched();render()">
        <input type="number" value="${p.salary||''}" placeholder="${S.salary||''}" style="font-size:11px;padding:3px 5px" inputmode="numeric" onchange="S.periods[${i}].salary=+this.value||undefined;sched();render()">
        <button class="dbtn" onclick="delPeriod('${p.id}')">×</button>
      </div>`).join('')}
      <button class="ghost-btn" style="margin-top:.75rem" onclick="openPerModal()">+ add period</button>
    </div>`;
}

// ── Actions ───────────────────────────────────────────────────
function switchView(v){view=v;render();}
function applyTheme(t){S.theme=t;sched();render();}
function setAP(id){S.activePeriod=id;render();}
function setPeriodSalary(pid,val){
  const p=S.periods.find(p=>p.id===pid);if(!p)return;
  const n=parseFloat(val)||0;
  if(!n||n===(S.salary||0))delete p.salary;else p.salary=n;
  sched();render();
}
function updateAmort(car,idx,field,val){
  const arr=car==='livina'?S.livina:S.vios;
  if(['dueAmt','planned','pay1','pay2'].includes(field))arr[idx][field]=parseFloat(val)||0;
  else arr[idx][field]=val;
  sched();render();
}
// ── Fixed addAmortRow — uses unique timestamp ID, no render loop ──
function addAmortRow(car){
  const arr=car==='livina'?S.livina:S.vios;
  const prefix=car==='livina'?'l':'v';
  arr.push({id:prefix+'_'+Date.now(),dueAmt:0,planned:0,pay1:0,pay2:0,dueDate:'',payDate1:'',payDate2:''});
  sched();
  // use setTimeout to break out of any event handler before re-render
  setTimeout(()=>render(),0);
}
function delAmortRow(car,idx){
  const arr=car==='livina'?S.livina:S.vios;
  if(arr.length<=1)return;
  const row=arr[idx];
  S.periods.forEach(period=>{
    const exps=S.expsShared[period.id];if(!exps)return;
    const prefix='amort_'+row.id+'_';
    for(let i=exps.length-1;i>=0;i--){if(exps[i].id&&exps[i].id.startsWith(prefix))exps.splice(i,1);}
  });
  arr.splice(idx,1);
  sched();render();
}
function openExpModal(who){
  expTarget=who;
  const cats=who==='shared'?CATS_SHARED:CATS_PERSONAL;
  setTimeout(()=>{
    const catEl=document.getElementById('em-cat');if(catEl)catEl.innerHTML=cats.map(c=>`<option value="${c.k}">${c.l}</option>`).join('');
    const d=document.getElementById('em-desc');if(d)d.value='';
    const a=document.getElementById('em-amt');if(a)a.value='';
    const dt=document.getElementById('em-date');if(dt)dt.value=todayStr();
    const ti=document.getElementById('em-title');if(ti)ti.textContent='Add — '+(who==='cel'?'Cel 🌸':who==='bryan'?'Bryan':'Shared pool');
    const m=document.getElementById('exp-modal');if(m)m.classList.add('open');
  },0);
}
function closeModal(){
  ['exp-modal','per-modal','groc-modal'].forEach(id=>{const m=document.getElementById(id);if(m)m.classList.remove('open');});
}
function submitExp(){
  const desc=(document.getElementById('em-desc').value||'').trim();
  const amt=parseFloat(document.getElementById('em-amt').value)||0;
  if(!desc||!amt)return;
  const cat=document.getElementById('em-cat').value;
  const date=document.getElementById('em-date').value||todayStr();
  const type=document.getElementById('em-type').value;
  const pid=S.activePeriod;
  const entry={id:'e'+Date.now(),desc,cat,amt,date,type,auto:false};
  if(expTarget==='shared'){if(!S.expsShared[pid])S.expsShared[pid]=[];S.expsShared[pid].push(entry);}
  else if(expTarget==='cel'){if(!S.expsCel[pid])S.expsCel[pid]=[];S.expsCel[pid].push(entry);}
  else{if(!S.expsBry[pid])S.expsBry[pid]=[];S.expsBry[pid].push(entry);}
  sched();closeModal();render();
}
function delExp(who,pid,i){
  const map={shared:S.expsShared,cel:S.expsCel,bryan:S.expsBry};
  const list=map[who]&&map[who][pid];
  if(list){list.splice(i,1);sched();render();}
}
function openPerModal(){
  setTimeout(()=>{
    ['pm-label','pm-payday','pm-start','pm-end'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    const m=document.getElementById('per-modal');if(m)m.classList.add('open');
  },0);
}
function submitPeriod(){
  const label=(document.getElementById('pm-label').value||'').trim()||'New period';
  const payday=document.getElementById('pm-payday').value||'';
  const start=document.getElementById('pm-start').value||todayStr();
  const end=document.getElementById('pm-end').value||todayStr();
  S.periods.unshift({id:'p'+Date.now(),label,payday,start,end});
  S.activePeriod=S.periods[0].id;
  sched();closeModal();render();
}
function delPeriod(id){
  if(S.periods.length<=1)return;
  S.periods=S.periods.filter(p=>p.id!==id);
  if(S.activePeriod===id)S.activePeriod=S.periods[0].id;
  sched();render();
}

// ── Grocery actions ───────────────────────────────────────────
function openGrocModalNew(){
  const inp=document.getElementById('groc-inp');
  groceryEditId=null;
  groceryPhotoData=null;
  groceryPickerEmoji=null;
  setTimeout(()=>{
    const nm=document.getElementById('gm-name');if(nm){nm.value=inp?inp.value:'';}
    const qty=document.getElementById('gm-qty');if(qty)qty.value='';
    const pr=document.getElementById('gm-price');if(pr)pr.value='';
    const tot=document.getElementById('gm-total');if(tot)tot.value='';
    const prev=document.getElementById('groc-photo-preview');if(prev){prev.style.display='none';prev.src='';}
    const lbl=document.getElementById('groc-upload-label');if(lbl)lbl.style.display='';
    const ti=document.getElementById('groc-modal-title');if(ti)ti.textContent='Add grocery item';
    buildEmojiPicker(inp?getEmoji(inp.value||''):'🛒');
    if(inp)inp.value='';
    const m=document.getElementById('groc-modal');if(m)m.classList.add('open');
  },0);
}
function openGrocModal(idx){
  const item=(S.grocery||[])[idx];if(!item)return;
  groceryEditId=idx;
  groceryPhotoData=item.photo||null;
  groceryPickerEmoji=item.emoji||'🛒';
  setTimeout(()=>{
    const nm=document.getElementById('gm-name');if(nm)nm.value=item.name||'';
    const qty=document.getElementById('gm-qty');if(qty)qty.value=item.qty||'';
    const pr=document.getElementById('gm-price');if(pr)pr.value=item.price||'';
    grocCalcTotal();
    const prev=document.getElementById('groc-photo-preview');
    if(prev){if(item.photo){prev.src=item.photo;prev.style.display='block';}else{prev.style.display='none';prev.src='';}}
    const lbl=document.getElementById('groc-upload-label');if(lbl)lbl.style.display=item.photo?'none':'';
    const ti=document.getElementById('groc-modal-title');if(ti)ti.textContent='Edit — '+item.name;
    buildEmojiPicker(item.emoji||'🛒');
    const m=document.getElementById('groc-modal');if(m)m.classList.add('open');
  },0);
}
function buildEmojiPicker(sel){
  if(!groceryPickerEmoji)groceryPickerEmoji=sel;
  setTimeout(()=>{
    const el=document.getElementById('groc-emoji-picker');if(!el)return;
    el.innerHTML=GROCERY_EMOJIS.map(e=>`<button class="ep-btn${e===groceryPickerEmoji?' sel':''}" onclick="selectGrocEmoji('${e}')">${e}</button>`).join('');
  },10);
}
function selectGrocEmoji(e){
  groceryPickerEmoji=e;
  document.querySelectorAll('.ep-btn').forEach(b=>{b.classList.toggle('sel',b.textContent===e);});
}
function grocAutoEmoji(){
  const nm=document.getElementById('gm-name');if(!nm)return;
  if(!groceryEditId&&!groceryPickerEmoji){groceryPickerEmoji=getEmoji(nm.value);buildEmojiPicker(groceryPickerEmoji);}
}
function grocCalcTotal(){
  const q=parseFloat((document.getElementById('gm-qty')||{}).value)||0;
  const p=parseFloat((document.getElementById('gm-price')||{}).value)||0;
  const t=document.getElementById('gm-total');if(t)t.value=q&&p?Math.round(q*p):'';
}
function grocPreviewPhoto(input){
  if(!input.files||!input.files[0])return;
  const reader=new FileReader();
  reader.onload=e=>{
    groceryPhotoData=e.target.result;
    const prev=document.getElementById('groc-photo-preview');if(prev){prev.src=groceryPhotoData;prev.style.display='block';}
    const lbl=document.getElementById('groc-upload-label');if(lbl)lbl.style.display='none';
  };
  reader.readAsDataURL(input.files[0]);
}
function submitGrocery(){
  const name=(document.getElementById('gm-name').value||'').trim();if(!name)return;
  const qty=parseFloat(document.getElementById('gm-qty').value)||0;
  const price=parseFloat(document.getElementById('gm-price').value)||0;
  const emoji=groceryPickerEmoji||getEmoji(name);
  const photo=groceryPhotoData||null;
  if(!S.grocery)S.grocery=[];
  if(groceryEditId!==null&&groceryEditId!==undefined){
    S.grocery[groceryEditId]={...S.grocery[groceryEditId],name,emoji,photo,qty,price};
  } else {
    S.grocery.push({id:'g'+Date.now(),name,emoji,photo,qty,price,checked:false});
  }
  sched();closeModal();render();
}
function toggleGroc(i){if(S.grocery&&S.grocery[i]){S.grocery[i].checked=!S.grocery[i].checked;sched();render();}}
function delGroc(i){if(S.grocery){S.grocery.splice(i,1);sched();render();}}
function updateGroc(i,field,val){
  if(!S.grocery||!S.grocery[i])return;
  S.grocery[i][field]=parseFloat(val)||0;
  sched();render();
}
function quickAddGroc(name,emoji){
  if(!S.grocery)S.grocery=[];
  if(S.grocery.find(i=>i.name.toLowerCase()===name.toLowerCase()))return;
  S.grocery.push({id:'g'+Date.now(),name,emoji,photo:null,qty:1,price:0,checked:false});
  sched();render();
}

// ── Boot ──────────────────────────────────────────────────────
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
async function boot(){
  await loadFromSB();
  if(!S.grocery)S.grocery=[];
  render();
  document.getElementById('ls').classList.add('hidden');
  subscribeRT();
}
boot();
</script>
